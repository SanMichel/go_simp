{{define "login"}}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMP — Login</title>
    <meta name="description" content="Login do SIMP para acesso por perfil." />
    <link rel="stylesheet" href="/admin.css" />
</head>

<body>
    <div id="loader" class="hidden">⠿</div>

    <div id="admin-login-screen">
        <div class="login-card">
            <div class="login-header">
                <div class="icon">📦</div>
                <h2>SIMP</h2>
                <p>Acesso ao sistema</p>
            </div>
            <form id="form-login-page" autocomplete="on">
                <div class="form-field">
                    <label for="login-username">Usuário</label>
                    <input type="text" id="login-username" name="username" placeholder="Seu usuário" required>
                </div>
                <div class="form-field">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" name="password" placeholder="••••••••" required>
                </div>
                <p id="login-error" class="error-msg hidden"></p>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>

    <script src="/shared.js"></script>
    <script src="/login.js"></script>
</body>

</html>
{{end}}
