{{define "activities_table"}}<table class="table"><thead><tr><th></th><th>ID</th><th>Usuário</th><th>Empresa</th><th>Rua</th><th>Prédio</th><th>Data</th><th>Impresso</th><th></th></tr></thead><tbody>{{range .Activities}}<tr><td><input type="checkbox" class="bulk" value="{{.ID}}"></td><td>#{{.ID}}</td><td>{{.Username}}</td><td>{{.Empresa}}</td><td>{{.Rua}}</td><td>{{.Predio}}</td><td>{{date .DataFim}}</td><td>{{checked .Impresso}}</td><td class="row"><button class="secondary" hx-get="/dashboard/activities/{{.ID}}/details" hx-target="#modal">Detalhes</button><a class="btn" href="/dashboard/activities/{{.ID}}/print-view">Imprimir</a></td></tr>{{else}}<tr><td colspan="9" class="muted">Nenhuma atividade encontrada.</td></tr>{{end}}</tbody></table><button class="secondary noprint" hx-on:click="bulkPrint()">Imprimir selecionadas</button>{{end}}
